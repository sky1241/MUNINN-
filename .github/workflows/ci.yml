name: MUNINN CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Codebook + Codec

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate CODEBOOK.json
        run: |
          python3 - <<'EOF'
          import json, sys

          with open("CODEBOOK.json", encoding="utf-8") as f:
              cb = json.load(f)

          errors = []

          # Check meta
          assert "meta" in cb, "Missing meta"
          assert "symbols" in cb, "Missing symbols"
          assert "domains" in cb, "Missing domains"

          # Check no duplicate IDs
          ids = {}
          for sym, data in cb["symbols"].items():
              if not isinstance(data, dict) or "id" not in data:
                  continue
              uid = data["id"]
              if uid in ids:
                  errors.append(f"Duplicate ID {uid}: {sym} vs {ids[uid]}")
              ids[uid] = sym

          # Check required fields
          for sym, data in cb["symbols"].items():
              if not isinstance(data, dict) or "concept" not in data:
                  continue
              for field in ["id", "concept", "domain", "desc"]:
                  if field not in data:
                      errors.append(f"Symbol '{sym}' missing field '{field}'")

          if errors:
              print("ERRORS:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)

          symbols = {k: v for k, v in cb["symbols"].items()
                     if isinstance(v, dict) and "concept" in v}
          print(f"✓ CODEBOOK valid — {len(symbols)} symbols, {len(ids)} unique IDs")
          EOF

      - name: Test Codec
        run: |
          python3 - <<'EOF'
          import subprocess, sys

          # Test stats
          r = subprocess.run(["python3", "engine/core/muninn_codec.py", "stats"], capture_output=True, text=True)
          assert r.returncode == 0, f"stats failed: {r.stderr}"
          print(r.stdout)

          # Test encode
          r = subprocess.run(
              ["python3", "engine/core/muninn_codec.py", "encode", "S-2 pipeline complet, 459 chunks, p=3.4e-12"],
              capture_output=True, text=True
          )
          assert r.returncode == 0, f"encode failed: {r.stderr}"
          print(f"encode: {r.stdout.strip()}")

          # Test decode roundtrip
          encoded = r.stdout.strip()
          r2 = subprocess.run(
              ["python3", "engine/core/muninn_codec.py", "decode", encoded],
              capture_output=True, text=True
          )
          assert r2.returncode == 0, f"decode failed: {r2.stderr}"
          print(f"decode: {r2.stdout.strip()}")

          print("✓ Codec OK")
          EOF

      - name: Compression ratio check
        run: |
          python3 - <<'EOF'
          import json

          with open("CODEBOOK.json", encoding="utf-8") as f:
              cb = json.load(f)

          ex = cb.get("compression_examples", {})
          if ex:
              orig = len(ex["texte_brut"])
              comp = len(ex["muninn"])
              ratio = 100 * (orig - comp) // orig
              print(f"Compression example: {orig} → {comp} chars ({ratio}% reduction)")
              assert ratio >= 50, f"Compression ratio {ratio}% below 50% threshold"
              print(f"✓ Ratio {ratio}% >= 50% threshold")
          EOF

      - name: Validate Tree Integrity
        run: |
          python3 - <<'EOF'
          import json, sys, os

          with open("memory/tree.json", encoding="utf-8") as f:
              tree = json.load(f)

          errors = []
          nodes = tree["nodes"]
          budget = tree["budget"]

          # Check all node files exist
          for name, node in nodes.items():
              filepath = os.path.join("memory", node["file"])
              if not os.path.exists(filepath):
                  errors.append(f"Node '{name}': file '{filepath}' not found")
                  continue

              # Count actual lines
              with open(filepath, encoding="utf-8") as f:
                  actual_lines = sum(1 for _ in f)

              # Check budget (R1)
              max_lines = node["max_lines"]
              if actual_lines > max_lines:
                  errors.append(f"Node '{name}': {actual_lines} lines > budget {max_lines} (R1 VIOLATION)")

              # Check declared lines match actual
              declared = node["lines"]
              if abs(actual_lines - declared) > 2:
                  errors.append(f"Node '{name}': declared {declared} lines but actual {actual_lines}")

          # Check root has children listed
          root = nodes.get("root", {})
          for child in root.get("children", []):
              if child not in nodes:
                  errors.append(f"Root child '{child}' not in nodes")

          # Check required node fields
          for name, node in nodes.items():
              for field in ["type", "file", "lines", "max_lines"]:
                  if field not in node:
                      errors.append(f"Node '{name}' missing field '{field}'")

          if errors:
              print("TREE ERRORS:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)

          print(f"✓ Tree valid — {len(nodes)} nodes, all within budget")
          EOF

      - name: Test Engine Commands
        run: |
          python3 - <<'EOF'
          import subprocess, sys

          # Test status
          r = subprocess.run(["python3", "engine/core/muninn.py", "status"],
                             capture_output=True, text=True)
          assert r.returncode == 0, f"status failed: {r.stderr}"
          assert "MUNINN TREE" in r.stdout, "status output missing header"
          assert "OVER!" not in r.stdout, f"Budget violation detected:\n{r.stdout}"
          print(r.stdout)

          # Test prune (dry run)
          r = subprocess.run(["python3", "engine/core/muninn.py", "prune"],
                             capture_output=True, text=True)
          assert r.returncode == 0, f"prune failed: {r.stderr}"
          print(r.stdout)

          print("✓ Engine commands OK")
          EOF
