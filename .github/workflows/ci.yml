name: MUNINN CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Engine + Mycelium + Tree

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate Tree Integrity
        run: |
          python3 - <<'EOF'
          import json, sys, os

          with open("memory/tree.json", encoding="utf-8") as f:
              tree = json.load(f)

          errors = []
          nodes = tree["nodes"]
          budget = tree["budget"]

          for name, node in nodes.items():
              filepath = os.path.join("memory", node["file"])
              if not os.path.exists(filepath):
                  errors.append(f"Node '{name}': file '{filepath}' not found")
                  continue

              with open(filepath, encoding="utf-8") as f:
                  actual_lines = sum(1 for _ in f)

              max_lines = node["max_lines"]
              if actual_lines > max_lines:
                  errors.append(f"Node '{name}': {actual_lines} lines > budget {max_lines} (R1 VIOLATION)")

              declared = node["lines"]
              if abs(actual_lines - declared) > 2:
                  errors.append(f"Node '{name}': declared {declared} lines but actual {actual_lines}")

          root = nodes.get("root", {})
          for child in root.get("children", []):
              if child not in nodes:
                  errors.append(f"Root child '{child}' not in nodes")

          for name, node in nodes.items():
              for field in ["type", "file", "lines", "max_lines"]:
                  if field not in node:
                      errors.append(f"Node '{name}' missing field '{field}'")

          if errors:
              print("TREE ERRORS:")
              for e in errors:
                  print(f"  {e}")
              sys.exit(1)

          print(f"OK Tree valid — {len(nodes)} nodes, all within budget")
          EOF

      - name: Test Engine Commands
        run: |
          python3 - <<'EOF'
          import subprocess, sys

          # Test status
          r = subprocess.run(["python3", "engine/core/muninn.py", "status"],
                             capture_output=True, text=True)
          assert r.returncode == 0, f"status failed: {r.stderr}"
          assert "MUNINN TREE" in r.stdout, "status output missing header"
          assert "OVER!" not in r.stdout, f"Budget violation detected:\n{r.stdout}"
          print(r.stdout)

          # Test prune (dry run)
          r = subprocess.run(["python3", "engine/core/muninn.py", "prune"],
                             capture_output=True, text=True)
          assert r.returncode == 0, f"prune failed: {r.stderr}"
          print(r.stdout)

          # Test compress
          r = subprocess.run(["python3", "engine/core/muninn.py", "compress", "README.md"],
                             capture_output=True, text=True)
          assert r.returncode == 0, f"compress failed: {r.stderr}"
          assert "MUNINN" in r.stdout, "compress output missing header"
          print("compress: OK")

          # Test boot
          r = subprocess.run(["python3", "engine/core/muninn.py", "boot"],
                             capture_output=True, text=True)
          assert r.returncode == 0, f"boot failed: {r.stderr}"
          assert "root" in r.stdout.lower(), "boot output missing root"
          print("boot: OK")

          print("OK Engine commands all pass")
          EOF

      - name: Test Mycelium
        run: |
          python3 - <<'EOF'
          import subprocess, sys

          # Test mycelium simulate
          r = subprocess.run(
              ["python3", "engine/core/mycelium.py", "simulate", "."],
              capture_output=True, text=True
          )
          assert r.returncode == 0, f"simulate failed: {r.stderr}"
          assert "MYCELIUM" in r.stdout, "simulate output missing header"
          assert "Fusions" in r.stdout, "simulate should produce fusions"
          print(r.stdout[:500])

          # Test bootstrap on this repo
          r = subprocess.run(
              ["python3", "engine/core/muninn.py", "bootstrap", "."],
              capture_output=True, text=True
          )
          assert r.returncode == 0, f"bootstrap failed: {r.stderr}"
          assert "BOOTSTRAP" in r.stdout, "bootstrap output missing header"
          assert "Scanned" in r.stdout, "bootstrap should report scanned files"
          print("bootstrap: OK")

          print("OK Mycelium tests pass")
          EOF
